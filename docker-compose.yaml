services:
  db:
    image: postgres:18.3-alpine
    container_name: postgres-love4animals
    restart: always
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: love4animals
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker

  pgadmin:
    image: dpage/pgadmin4:latest 
    container_name: pgadmin-love4animals
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: test@test.com
      PGADMIN_DEFAULT_PASSWORD: test
    ports:
      - "5050:80"
    depends_on:
      - db

  redis:
    image: redis:7-alpine
    container_name: redis-love4animals
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: